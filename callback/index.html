<!DOCTYPE html>
<html>
<head>
<title>Clanker Sports — TikTok Auth</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 80px auto; padding: 20px; background: #111; color: #eee; }
h1 { color: #FF1744; }
.code-box { background: #222; border: 2px solid #FF1744; padding: 20px; border-radius: 8px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 14px; }
button { background: #FF1744; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; }
button:hover { background: #d50000; }
.success { color: #4CAF50; }
.error { color: #FF1744; }
</style>
</head>
<body>
<h1>Clanker Sports</h1>
<div id="content">Processing TikTok authorization...</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const state = params.get('state');

const el = document.getElementById('content');

if (error) {
    const desc = params.get('error_description') || error;
    el.innerHTML = '<p class="error">Authorization failed: ' + desc + '</p><p>Close this window and try again.</p>';
} else if (code) {
    el.innerHTML = '<h2 class="success">Authorization Successful!</h2>' +
        '<p>Copy this authorization code and paste it into your terminal:</p>' +
        '<div class="code-box" id="code">' + code + '</div>' +
        '<button onclick="copyCode()">Copy Code</button>' +
        '<p id="status"></p>' +
        '<p style="margin-top:30px;color:#888;">After pasting the code in terminal, you can close this window.</p>';
} else {
    el.innerHTML = '<p class="error">No authorization code received.</p><p>Try the OAuth flow again.</p>';
}

function copyCode() {
    navigator.clipboard.writeText(code).then(() => {
        document.getElementById('status').innerHTML = '<span class="success">Copied!</span>';
    });
}
</script>
</body>
</html>
